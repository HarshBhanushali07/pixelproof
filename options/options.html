<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PixelProof Settings</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; color: #111; }
    label { display:block; margin-top:12px; font-size:13px; }
    input[type=text] { width:100%; padding:8px; margin-top:6px; box-sizing:border-box; }
    button { margin-top:14px; padding:10px 14px; }
    .status { margin-top:10px; color: #555; }
  </style>
</head>
<body>
  <h2>PixelProof — Settings</h2>
  <p>Paste your API keys here. Keys are saved locally to `chrome.storage.local` and never synced to a remote git repo.</p>

  <label>Reality Defender API Key
    <input id="rdKey" type="text" placeholder="rd_xxx...">
  </label>

  <label>Gemini / Google Generative API Key
    <input id="geminiKey" type="text" placeholder="AIza... or other key">
  </label>

  <label>Google Fact Check API Key
    <input id="factKey" type="text" placeholder="AIza...">
  </label>

  <button id="saveBtn">Save keys</button>
  <button id="clearBtn" style="margin-left:8px;">Clear keys</button>

  <div class="status" id="status">Status: Not saved</div>

  <script src="options.js"></script>
</body>
</html>
