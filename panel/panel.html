<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="header">
    <div class="brand">
      <span>🛡</span> PixelProof
    </div>
    <button id="closeBtn">✕</button>
  </div>

  <div class="verdict-container">
    <h1 id="verdictText">Scanning...</h1>
    <div class="confidence-wrapper">
      <div class="confidence-bar" id="confidenceBar"></div>
    </div>
  </div>

  <div class="section">
    <h3>Analysis <button id="btnListen" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:16px;" title="Listen to explanation">🔊</button></h3>
    <p id="explanationText">Waiting for Gemini AI analysis...</p>
    <div class="chip" id="aiSourceChip">Unknown Source</div>
    <div class="chip" id="exifChip" style="margin-top: 8px;">Metadata: Loading...</div>
  </div>

  <div class="section">
    <h3>Fact Check</h3>
    <div id="factsList">No fact checks found.</div>
  </div>

  <div class="actions">
    <button id="btnShareX" style="background:#0f1419;">𝕏 Share</button>
    <button id="btnReverse">🔍 Reverse Search</button>
    <button id="btnReport">⚑ Report Wrong</button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
